<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<link rel="icon" type="image/png" href="E3A460C6-A090-4050-8A2C-BED2517189E3.png">
<link rel="apple-touch-E3A460C6-A090-4050-8A2C-BED2517189E3" href="E3A460C6-A090-4050-8A2C-BED2517189E3.png">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
 

<title>مسابقه ریاضی پایه اول</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

 <img src="8CD46DAD-DFFD-43E6-BC7F-7DCC2C95B0A8.png" class="logo"> 
<h1>🎉 مسابقه ریاضی پایه اول 🎉</h1>

<div id="startPage">

<h2>🌸به بازی خوش آمدی 🌸</h2>

<label class="title">

نام دانش‌آموز

</label>

<input
type="text"
id="studentName"
placeholder="نام خود را وارد کنید">

<h3>

جنسیت را انتخاب کن

</h3>

<div class="genderBox">

<label class="gender">

<input
type="radio"
name="gender"
value="girl"
checked>

👧 دختر

</label>

<label class="gender">

<input
type="radio"
name="gender"
value="boy">

👦 پسر

</label>

</div>

<button id="startBtn">

🚀 شروع مسابقه

</button>

</div>

<div id="gamePage" style="display:none;">

<div class="info">

<div class="box">

<span id="avatar">

👧

</span>

<span id="showName"></span>

</div>

<div class="box">

⭐ امتیاز

<span id="score">

۰

</span>

</div>

<div class="box">

📚 سؤال

<span id="questionNumber">

۱

</span>

از

<span>

۹

</span>

</div>

</div>

<div class="question">

حاصل جمع در کدام گزینه برابر با

<span id="targetNumber">

۱

</span>

است؟

</div>

<div class="options">

<button id="op1" class="option"></button>

<button id="op2" class="option"></button>

<button id="op3" class="option"></button>

<button id="op4" class="option"></button>

</div>

<div id="message"></div>

<button id="nextBtn">

➡️ سؤال بعدی

</button>

</div>

<div id="finishPage" style="display:none;">

<h2>

🎊 مسابقه تمام شد 🎊

</h2>

<div id="finishAvatar">

👧

</div>

<h2 id="resultName"></h2>

<h3>

امتیاز شما

</h3>

<h1 id="finalScore"></h1>

<div id="medal"></div>

<button onclick="location.reload()">

🔄 بازی دوباره

</button>

</div>

</div>

<footer>
  
 A-I based education content creator
 
<strong>
  
  👩🏻‍💻آموزگار پایه اوّل :مهندس مرضیه محمّدی

</strong>

</footer>

<script src="script.js"></script>

</body>

</html>
